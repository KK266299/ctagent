degradation:
  type: "artifact"
  variants:
    metal_artifact:
      enabled: true
      metal_types: ["hip", "dental", "spine"]
      severity: ["mild", "moderate", "severe"]
    streak_artifact:
      enabled: true
    ring_artifact:
      enabled: true
      ring_count_range: [1, 5]
    motion_artifact:
      enabled: false
