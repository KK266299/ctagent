# ============================================================================
# CQ500 闭源 API 诊断分类评测配置
# ============================================================================

data:
  reads_csv: "/home/liuxinyao/data/cq500/reads.csv"
  processed_dir: "/home/liuxinyao/data/cq500_processed"
  # restored_dir: null  # 后续阶段使用
  max_slices_per_case: 5
  mask_idx: 0

llm:
  provider: "openai"
  model: "qwen/qwen-2.5-vl-72b-instruct"
  base_url: "https://openrouter.ai/api/v1"
  # api_key 从环境变量 OPENAI_API_KEY 读取 (OpenRouter key: sk-or-v1-...)
  temperature: 0.1
  max_tokens: 1024
  timeout: 120

windowing:
  mu_water: 0.192
  window_center: 40.0
  window_width: 80.0

eval:
  input_types: ["clean", "degraded"]
  rate_limit_sec: 1.0

output:
  dir: "results/cq500_api_eval"
